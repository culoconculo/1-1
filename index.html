
   <script>
const firebaseConfig = {
  apiKey: "XXX",
  authDomain: "XXX",
  projectId: "XXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let userId = Math.random().toString(36).substring(7);

async function joinQueue() {
  document.getElementById("home").style.display = "none";
  document.getElementById("queue").style.display = "block";

  // User in Queue setzen
  await db.collection("queue").doc(userId).set({
    timestamp: Date.now()
  });

  listenForMatch();
}

function listenForMatch() {
  setInterval(async () => {

    const queueSnap = await db.collection("queue")
      .orderBy("timestamp")
      .get();

    const users = queueSnap.docs.map(d => d.id);

    // Wenn ich nicht der erste bin → Match finden
    if (users.length >= 2) {

      const otherUser = users.find(u => u !== userId);

      if (!otherUser) return;

      const matchId = userId + "_" + otherUser;

      // Match erstellen (nur einmal!)
      const matchRef = db.collection("matches").doc(matchId);
      const matchDoc = await matchRef.get();

      if (!matchDoc.exists) {
        await matchRef.set({
          userA: userId,
          userB: otherUser,
          createdAt: Date.now()
        });
      }

      // Beide aus Queue entfernen
      await db.collection("queue").doc(userId).delete();
      await db.collection("queue").doc(otherUser).delete();

      showMatch();

    }

  }, 2000);
}

function showMatch() {
  document.getElementById("queue").style.display = "none";
  document.getElementById("match").style.display = "block";
}
</script>
