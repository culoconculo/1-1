
   <!DOCTYPE html>
<html>
<head>
  <title>Random Video Match</title>
</head>

<body style="font-family: Arial; text-align: center; margin-top: 60px; background:#0f0f0f; color:white;">

  <h1>Random Video Match</h1>

  <!-- HOME -->
  <div id="home">
    <p>Connect instantly with random people</p>
    <button onclick="start()" style="padding:15px 30px; font-size:16px; cursor:pointer;">
      Start Matching
    </button>
  </div>

  <!-- QUEUE -->
  <div id="queue" style="display:none;">
    <h2>Searching for match...</h2>
    <p>Hold on, finding someone</p>
  </div>

  <!-- MATCH -->
  <div id="match" style="display:none;">
    <h2>Match Found 🎉</h2>

    <div style="margin:20px; padding:40px; border:1px solid white;">
      <p>VIDEO AREA (coming next step)</p>
    </div>

    <button onclick="next()" style="padding:12px 25px;">
      Next Match
    </button>
  </div>

  <script>
    function start() {
      document.getElementById("home").style.display = "none";
      document.getElementById("queue").style.display = "block";

      setTimeout(() => {
        document.getElementById("queue").style.display = "none";
        document.getElementById("match").style.display = "block";
      }, 2000);
    }

    function next() {
      document.getElementById("match").style.display = "none";
      document.getElementById("queue").style.display = "block";

      setTimeout(() => {
        document.getElementById("queue").style.display = "none";
        document.getElementById("match").style.display = "block";
      }, 2000);
    }
  </script>

</body>
</html>
