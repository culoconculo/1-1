
   <!DOCTYPE html>
<html>
<head>
  <title>Random Match</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

</head>

<body style="font-family: Arial; text-align:center; margin-top:80px;">

<h1>Random Video Match</h1>

<div id="home">
  <button onclick="joinQueue()">Start</button>
</div>

<div id="queue" style="display:none;">
  <h2>Wartet auf Match...</h2>
</div>

<div id="match" style="display:none;">
  <h2>Match gefunden 🎉</h2>
</div>

<script>
  // 🔴 DEIN FIREBASE SETUP HIER EINTRAGEN
  const firebaseConfig = {
    apiKey: "XXX",
    authDomain: "XXX",
    projectId: "XXX",
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let userId = Math.random().toString(36).substring(7);

  async function joinQueue() {
    document.getElementById("home").style.display = "none";
    document.getElementById("queue").style.display = "block";

    await db.collection("queue").doc(userId).set({
      timestamp: Date.now()
    });

    checkMatch();
  }

  function checkMatch() {
    setInterval(async () => {
      const snapshot = await db.collection("queue").get();

      if (snapshot.size >= 2) {
        let count = 0;

        snapshot.forEach(doc => {
          if (count < 2) {
            db.collection("queue").doc(doc.id).delete();
            count++;
          }
        });

        document.getElementById("queue").style.display = "none";
        document.getElementById("match").style.display = "block";
      }
    }, 2000);
  }
</script>

</body>
</html>
